name: todo_app
description: A beautiful To-Do List app with Firebase Authentication and Realtime Database.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1

  # HTTP — for Realtime DB REST API calls
  dio: ^5.7.0

  # State Management
  provider: ^6.1.2

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  flutter_slidable: ^3.1.1

  # Utilities
  uuid: ^4.4.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0

  cupertino_icons: ^1.0.8
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/animations/
    - assets/images/
